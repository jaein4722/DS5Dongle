name: Build release firmware

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: resolve
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${INPUT_TAG:-$REF_NAME}"
          if [ -z "$tag" ]; then
            echo "No release tag was provided." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --generate-notes
          fi

  build:
    name: Build and upload release UF2
    needs: create-release
    uses: ./.github/workflows/build-firmware.yml
    with:
      ref: ${{ needs.create-release.outputs.tag }}
      version: ${{ needs.create-release.outputs.tag }}
      asset_suffix: -${{ needs.create-release.outputs.tag }}
      upload_tag: ${{ needs.create-release.outputs.tag }}
      no_batt_led_check: true
