name: Release synced upstream firmware

on:
  push:
    branches:
      - master
    paths:
      - ".github/upstream-release.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release tag
    runs-on: ubuntu-latest
    outputs:
      skipped: ${{ steps.result.outputs.skipped }}
      upstream_tag: ${{ steps.meta.outputs.upstream_tag }}
      custom_tag: ${{ steps.meta.outputs.custom_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read sync metadata
        id: meta
        run: |
          set -euo pipefail
          upstream_tag="$(jq -r .upstream_tag .github/upstream-release.json)"
          custom_tag="$(jq -r .custom_tag .github/upstream-release.json)"
          if [ -z "$upstream_tag" ] || [ "$upstream_tag" = "null" ]; then
            echo "Missing upstream_tag." >&2
            exit 1
          fi
          if [ -z "$custom_tag" ] || [ "$custom_tag" = "null" ]; then
            echo "Missing custom_tag." >&2
            exit 1
          fi
          echo "upstream_tag=$upstream_tag" >> "$GITHUB_OUTPUT"
          echo "custom_tag=$custom_tag" >> "$GITHUB_OUTPUT"

      - name: Prepare tag and release
        id: result
        env:
          GH_TOKEN: ${{ github.token }}
          CUSTOM_TAG: ${{ steps.meta.outputs.custom_tag }}
          UPSTREAM_TAG: ${{ steps.meta.outputs.upstream_tag }}
        run: |
          set -euo pipefail
          if gh release view "$CUSTOM_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            if gh release view "$CUSTOM_TAG" --repo "${{ github.repository }}" --json assets \
              | jq -e '.assets[] | select(.name | endswith(".uf2"))' >/dev/null; then
              echo "Release $CUSTOM_TAG already exists with UF2 assets."
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Release $CUSTOM_TAG exists but UF2 assets are missing; continuing build/upload."
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/$CUSTOM_TAG" >/dev/null 2>&1; then
            echo "Tag $CUSTOM_TAG already exists; using it for release."
          else
            git tag "$CUSTOM_TAG" "$GITHUB_SHA"
            git push origin "refs/tags/$CUSTOM_TAG"
          fi
          if gh release view "$CUSTOM_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Reusing existing release $CUSTOM_TAG."
          else
            upstream_url="https://github.com/awalol/DS5Dongle/releases/tag/$UPSTREAM_TAG"
            gh release create "$CUSTOM_TAG" \
              --repo "${{ github.repository }}" \
              --title "$CUSTOM_TAG" \
              --notes "Automated custom firmware build based on upstream DS5Dongle $UPSTREAM_TAG with the custom UF2 bootloader command.

Upstream release and changelog: $upstream_url"
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"

  build:
    name: Build and upload patched upstream UF2
    needs: prepare
    if: needs.prepare.outputs.skipped != 'true'
    uses: ./.github/workflows/build-firmware.yml
    with:
      repo: awalol/DS5Dongle
      ref: ${{ needs.prepare.outputs.upstream_tag }}
      version: ${{ needs.prepare.outputs.custom_tag }}
      asset_suffix: -${{ needs.prepare.outputs.custom_tag }}
      upload_tag: ${{ needs.prepare.outputs.custom_tag }}
      picow: true
      no_batt_led_check: false
      patch_bootloader: true
