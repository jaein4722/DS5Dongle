name: Sync upstream release

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: Upstream DS5Dongle tag to sync. Empty = latest release.
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  prepare:
    name: Resolve upstream release
    runs-on: ubuntu-latest
    outputs:
      skipped: ${{ steps.result.outputs.skipped }}
      upstream_tag: ${{ steps.result.outputs.upstream_tag }}
      custom_tag: ${{ steps.result.outputs.custom_tag }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Resolve upstream release
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag }}
        run: |
          set -euo pipefail
          upstream_tag="$INPUT_UPSTREAM_TAG"
          if [ -z "$upstream_tag" ]; then
            upstream_tag="$(gh api repos/awalol/DS5Dongle/releases/latest --jq .tag_name)"
          fi
          if [ -z "$upstream_tag" ]; then
            echo "Could not resolve upstream tag." >&2
            exit 1
          fi
          custom_tag="${upstream_tag}-custom.1"
          echo "upstream_tag=$upstream_tag" >> "$GITHUB_OUTPUT"
          echo "custom_tag=$custom_tag" >> "$GITHUB_OUTPUT"

      - name: Stop if custom release already exists
        id: existing
        env:
          CUSTOM_TAG: ${{ steps.resolve.outputs.custom_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$CUSTOM_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$CUSTOM_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Set result
        id: result
        run: |
          echo "skipped=${{ steps.existing.outputs.exists }}" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=${{ steps.resolve.outputs.upstream_tag }}" >> "$GITHUB_OUTPUT"
          echo "custom_tag=${{ steps.resolve.outputs.custom_tag }}" >> "$GITHUB_OUTPUT"

  update-metadata:
    name: Update release metadata
    needs: prepare
    if: needs.prepare.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          submodules: false

      - name: Commit upstream release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_TAG: ${{ needs.prepare.outputs.upstream_tag }}
          CUSTOM_TAG: ${{ needs.prepare.outputs.custom_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p .github
          cat > .github/upstream-release.json <<EOF
          {
            "upstream_repository": "awalol/DS5Dongle",
            "upstream_tag": "$UPSTREAM_TAG",
            "custom_tag": "$CUSTOM_TAG",
            "patch_revision": 1,
            "patches": [
              "uf2-bootloader-command"
            ]
          }
          EOF

          git add .github/upstream-release.json
          if git diff --cached --quiet; then
            echo "Metadata is already up to date."
          else
            git commit -m "chore: update upstream release metadata to $UPSTREAM_TAG"
            git push origin HEAD:master
          fi

  release:
    name: Prepare release
    needs:
      - prepare
      - update-metadata
    if: needs.prepare.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    outputs:
      skipped: ${{ steps.release.outputs.skipped }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          submodules: false

      - name: Ensure tag and release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          CUSTOM_TAG: ${{ needs.prepare.outputs.custom_tag }}
          UPSTREAM_TAG: ${{ needs.prepare.outputs.upstream_tag }}
        run: |
          set -euo pipefail
          if gh release view "$CUSTOM_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            if gh release view "$CUSTOM_TAG" --repo "${{ github.repository }}" --json assets \
              | jq -e '.assets[] | select(.name | endswith(".uf2"))' >/dev/null; then
              echo "Release $CUSTOM_TAG already exists with UF2 assets."
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Release $CUSTOM_TAG exists but UF2 assets are missing; continuing build/upload."
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/$CUSTOM_TAG" >/dev/null 2>&1; then
            echo "Tag $CUSTOM_TAG already exists; using it for release."
          else
            git tag "$CUSTOM_TAG" "$GITHUB_SHA"
            git push origin "refs/tags/$CUSTOM_TAG"
          fi

          if gh release view "$CUSTOM_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Reusing existing release $CUSTOM_TAG."
          else
            upstream_url="https://github.com/awalol/DS5Dongle/releases/tag/$UPSTREAM_TAG"
            notes="Automated custom firmware build based on upstream DS5Dongle $UPSTREAM_TAG with the custom UF2 bootloader command. Upstream release and changelog: $upstream_url"
            gh release create "$CUSTOM_TAG" \
              --repo "${{ github.repository }}" \
              --title "$CUSTOM_TAG" \
              --notes "$notes"
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"

  build:
    name: Build and upload patched upstream UF2
    needs:
      - prepare
      - release
    if: needs.prepare.outputs.skipped != 'true' && needs.release.outputs.skipped != 'true'
    uses: ./.github/workflows/build-firmware.yml
    with:
      repo: awalol/DS5Dongle
      ref: ${{ needs.prepare.outputs.upstream_tag }}
      version: ${{ needs.prepare.outputs.custom_tag }}
      asset_suffix: -${{ needs.prepare.outputs.custom_tag }}
      upload_tag: ${{ needs.prepare.outputs.custom_tag }}
      picow: true
      no_batt_led_check: false
      patch_bootloader: true
